# NATS Cluster Configuration

server_name: "node1"
host: 0.0.0.0
port: 4222

# Cluster definition
cluster {
  name: "my-cluster"
  host: 0.0.0.0
  port: 6222

  routes: [
    nats-route://node2.example.com:6222
    nats-route://node3.example.com:6222
  ]

  # Cluster TLS
  tls {
    cert_file: "/etc/nats/certs/server-cert.pem"
    key_file: "/etc/nats/certs/server-key.pem"
    ca_file: "/etc/nats/certs/ca.pem"
    verify: true
    timeout: 5
  }
}

# Gateway configuration
gateway {
  name: "east"
  port: 7222

  gateways: [
    {name: "east", urls: ["nats://node1:7222"]}
    {name: "west", urls: ["nats://node4:7222"]}
  ]
}
