# Full NATS Server Configuration
# Demonstrates all configuration features

server_name: "prod-east-1"
host: 0.0.0.0
port: 4222

# Variables
TOKEN = "s3cr3t"
CERT_DIR = "/etc/nats/certs"

# Logging
debug: false
trace: false
logtime: true
log_file: "/var/log/nats/nats-server.log"
log_size_limit: 100MB

# Limits
max_payload: 8MB
max_connections: 65536
max_control_line: 4KB
ping_interval: 2m
ping_max: 3
write_deadline: 10s

# TLS
tls {
  cert_file: "/etc/nats/certs/server-cert.pem"
  key_file: "/etc/nats/certs/server-key.pem"
  ca_file: "/etc/nats/certs/ca.pem"
  verify: true
  timeout: 5
}

# Authorization using variable
authorization {
  token: $TOKEN
  timeout: 5
}

# Cluster
cluster {
  name: "east-cluster"
  host: 0.0.0.0
  port: 6222

  routes: [
    nats-route://node2:6222
    nats-route://node3:6222
  ]

  tls {
    cert_file: "/etc/nats/certs/cluster-cert.pem"
    key_file: "/etc/nats/certs/cluster-key.pem"
    ca_file: "/etc/nats/certs/ca.pem"
    verify: true
  }
}

# JetStream
jetstream {
  store_dir: /var/lib/nats/jetstream
  max_mem: 4GB
  max_file: 100GB
}

# Accounts
accounts {
  SYS {
    users = [{user: "admin", password: "s3cr3t"}]
  }
}

system_account: SYS

# Include additional configuration
include ./auth.conf
include ./mappings.conf
