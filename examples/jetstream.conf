# NATS JetStream Configuration

server_name: "js-server"
port: 4222

# Enable JetStream
jetstream {
  store_dir: /var/lib/nats/jetstream
  max_mem: 1GB
  max_file: 10GB
  max_outstanding_catchup: 64MB
}

# Accounts with JetStream limits
accounts {
  SYS {
    users = [{user: "admin", password: "admin123"}]
  }

  APP {
    users = [{user: "app", password: "app123"}]
    jetstream {
      max_mem: 512MB
      max_file: 5GB
      max_streams: 100
      max_consumers: 1000
    }
  }
}

# System account
system_account: SYS
